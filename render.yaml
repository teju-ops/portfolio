services:
  - type: web
    name: portfolio-tej-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: portfolio
      - key: ADMIN_LOGIN_EMAIL
        sync: false
      - key: ADMIN_LOGIN_PASSWORD
        sync: false
      - key: ADMIN_AUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: PORTFOLIO_OWNER_NAME
        value: Tejaswini K Mahajan
